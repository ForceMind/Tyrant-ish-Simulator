<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <rect width="390" height="844" fill="#efd49a"/>
  <text x="16" y="42" font-family="Microsoft YaHei, sans-serif" font-size="26" font-weight="900" fill="#8f1d1d">快速版 · 1 年</text>
  <text x="16" y="76" font-family="Microsoft YaHei, sans-serif" font-size="16" fill="#5c3d26">关键选择 1/5 · 健康 70 · 威望 54</text>
  <rect x="306" y="18" width="68" height="54" rx="8" fill="#fff1c9" stroke="#8b5728"/>
  <text x="324" y="52" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="900" fill="#4b2510">退出</text>

  <rect x="16" y="92" width="358" height="220" rx="8" fill="#fff1c9" stroke="#c7a56d"/>
  <text x="38" y="142" font-family="Microsoft YaHei, sans-serif" font-size="24" font-weight="900" fill="#8f1d1d">关键节点</text>
  <text x="38" y="198" font-family="Microsoft YaHei, sans-serif" font-size="36" font-weight="900" fill="#35180c">户部端来空碗</text>
  <text x="38" y="252" font-family="Microsoft YaHei, sans-serif" font-size="18" fill="#35180c">户部尚书说国库还能撑三个月，</text>
  <text x="38" y="282" font-family="Microsoft YaHei, sans-serif" font-size="18" fill="#35180c">再少一点就只能发精神俸禄。</text>

  <rect x="16" y="334" width="358" height="286" rx="8" fill="#6f2019"/>
  <text x="38" y="380" font-family="Microsoft YaHei, sans-serif" font-size="24" font-weight="900" fill="#fff4d3">拍板</text>
  <text x="188" y="380" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#e7c99b">一键推进几年，史官负责补刀</text>
  <rect x="38" y="408" width="314" height="58" rx="8" fill="#fff6da"/>
  <rect x="38" y="486" width="314" height="58" rx="8" fill="#fff6da"/>
  <rect x="38" y="564" width="314" height="58" rx="8" fill="#fff6da"/>
  <text x="56" y="444" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="900" fill="#35180c">加税，相信百姓还有余额</text>
  <text x="56" y="522" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="900" fill="#35180c">宫里少点夜宵</text>
  <text x="56" y="600" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="900" fill="#35180c">卖几个官位</text>

  <rect x="16" y="644" width="358" height="150" rx="8" fill="#fff1c9" stroke="#c7a56d"/>
  <text x="38" y="694" font-family="Microsoft YaHei, sans-serif" font-size="30" font-weight="900" fill="#35180c">速写年表</text>
  <text x="58" y="740" font-family="Microsoft YaHei, sans-serif" font-size="18" fill="#5c3d26">1. 1年 · 快速登基</text>
  <text x="86" y="770" font-family="Microsoft YaHei, sans-serif" font-size="16" fill="#5c3d26">国库优先、快乐优先、边关漏风。</text>
  <rect x="16" y="810" width="358" height="26" rx="8" fill="#fff6da" stroke="#c7a56d"/>
  <text x="28" y="829" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="900" fill="#35180c">底部：国库 / 民心 / 军队 / 朝廷 / 快乐</text>
</svg>

